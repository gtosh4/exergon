[package]
name = "exergon"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18", features = ["dynamic_linking"] }
bevy_voxel_world = "0.15"
bevy_egui = "0.39"
avian3d = "0.6"
bevy-tnua = "0.31"
bevy-tnua-avian3d = "0.11"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
ron = "0.8"
rand = "0.8"
rand_pcg = "0.3"
noise = "0.9"
xxhash-rust = { version = "0.8", features = ["xxh64"] }
anyhow = "1"
thiserror = "2"
image = { version = "0.25", default-features = false, features = ["png"] }
clap = { version = "4.6.1", features = ["derive"] }
chrono = { version = "0.4", default-features = false, features = ["clock"] }

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3

[lints.rust]
dead_code = "allow" # TEMP until MVP

[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
indexing_slicing = "warn"
panic = "warn"
todo = "warn"
