[package]
name = "exergon"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.18", features = ["dynamic_linking"] }
bevy_voxel_world = "0.15"
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
ron = "0.8"
rand = "0.8"
rand_pcg = "0.3"
noise = "0.9"
xxhash-rust = { version = "0.8", features = ["xxh64"] }
anyhow = "1"
thiserror = "2"

[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
